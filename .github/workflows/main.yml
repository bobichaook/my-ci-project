name: My First CI Pipeline # 流水线的名字

# 1. 触发条件：什么时候启动这条流水线？
on:
  push:
    branches: [ "main" ] # 当有代码推送到 main 分支时触发

# 2. 任务清单：流水线启动后要做什么？
jobs:
  build-and-test: # 任务名称
    runs-on: ubuntu-latest # 给机器人分配一台最新的 Ubuntu 虚拟服务器

    steps: # 具体的执行步骤
    - name: 把代码拉取到虚拟服务器上
      uses: actions/checkout@v3

    - name: 安装 Python 3.10 环境
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 安装测试工具包 (pytest)
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: 运行自动化测试！(关键防线)
      run: |
        pytest
